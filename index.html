<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Lora Website</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="index.js"></script>
</head>
<body class="bg-light">

<div class="container py-5">
    <h1 class="text-center mb-4">📡 LORA Test Website</h1>

    <div class="row g-4">

        <!-- Linke Seite -->
        <div class="col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h3 class="card-title">Nachricht senden</h3>
                    <p class="text-muted">
                        Auf dieser Website können Sie mit dem LoRa-Gerät kommunizieren.
                    </p>

                    <div class="input-group mb-3">
                        <input type="text" id="textInput" class="form-control" placeholder="Nachricht eingeben...">
                        <button class="btn btn-primary" onclick="submitText()">
                            Abschicken
                        </button>
                    </div>

                    <p id="output" class="alert alert-secondary">
                        Noch keine Nachricht gesendet.
                    </p>
                </div>
            </div>
        </div>

        <!-- Rechte Seite -->
        <div class="col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h3 class="card-title">📥 Empfangene Nachrichten</h3>

                    <div id="messageContainer"
                         class="border rounded p-3 bg-light"
                         style="height: 400px; overflow-y: auto;">

                        <div class="text-muted text-center">
                            Noch keine Nachrichten empfangen...
                        </div>

                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
